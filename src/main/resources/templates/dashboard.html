<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>CNC Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4"></div>

    <h1>CNC Production Monitoring System</h1>

    <hr>
    <h2>Dashboard de Producción CNC</h2>
    <hr>

    <h2>Indicadores</h2>

    <div class="row mb-4"></div>

        <div class="col-md-4">

            <div class="card text-center">

                <div class="card-body">

                    <h5>Máquinas Activas</h5>

                    <h2 th:text="${runningMachines}">
                    </h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card text-center">

                <div class="card-body">

                    <h5>Alarmas</h5>

                    <h2 th:text="${alarmMachines}">
                    </h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card text-center">

                <div class="card-body">

                    <h5>Producción Actual</h5>

                    <h2 th:text="${currentProduction}">
                    </h2>

                </div>

            </div>

        </div>

    </div>

    <h2>Estado Actual de Máquinas</h2>

    <table border="1">

        <tr>
            <th>Máquina</th>
            <th>Estado</th>
            <th>Producción</th>
        </tr>

        <tr th:each="machine : ${currentMachines}">

            <td th:text="${machine.machineName}">
            </td>

            <td th:text="${machine.status}">
            </td>

            <td th:text="${machine.productionCount}">
            </td>

        </tr>

    </table>

    <table border="1">

        <tr>
            <th>Machine</th>
            <th>Status</th>
            <th>Production</th>
            <th>Timestamp</th>
        </tr>

        <tr th:each="machine : ${machines}">
            <td th:text="${machine.machineName}"></td>
            <td th:text="${machine.status}"></td>
            <td th:text="${machine.productionCount}"></td>
            <td th:text="${machine.timestamp}"></td>
        </tr>

    </table>

    <h2>
    Total registros:
    <span th:text="${totalRecords}"></span>
    </h2>

    </div>

</body>
</html>
